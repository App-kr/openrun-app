name: taekit
description: 공연 티켓 오픈 알림 앱 — 택킷

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Data models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Network
  dio: ^5.4.3

  # Firebase
  firebase_core: ^2.31.0
  firebase_messaging: ^14.9.1

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Image
  cached_network_image: ^3.3.1

  # Database
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0

  # Routing
  go_router: ^13.2.1

  # Storage
  shared_preferences: ^2.2.3

  # Font
  google_fonts: ^6.2.1

  # Utilities
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  intl: ^0.20.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.10
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/classic/
    - assets/icons/gugak/
    - assets/privacy_policy.html
    - assets/icon_512.png
    - assets/icon_playstore.png
    - assets/icons/
